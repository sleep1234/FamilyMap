name: Build iOS IPA (Unsigned, TrollStore)

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Flutter dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: |
          # 构建 iOS release，跳过签名
          flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          # 从构建产物创建 IPA
          # Runner.app 在 build/ios/iphoneos/Runner.app
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r FamilyMap.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FamilyMap-unsigned-ipa
          path: FamilyMap.ipa
          retention-days: 30
