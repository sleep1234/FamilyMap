<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4F46E5">
<title>FamilyMap 家人位置共享</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#4F46E5;--primary-light:#6366F1;--bg:#F8FAFC;--card:#FFFFFF;
  --text:#1E293B;--text2:#64748B;--border:#E2E8F0;--success:#10B981;
  --danger:#EF4444;--warning:#F59E0B;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{display:flex;flex-direction:column;height:100%}

/* ===== 登录页 ===== */
.login-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;background:linear-gradient(135deg,#4F46E5 0%,#7C3AED 50%,#EC4899 100%);color:#fff;text-align:center}
.login-page h1{font-size:28px;margin-bottom:8px}
.login-page p{opacity:.85;font-size:15px;margin-bottom:32px}
.login-card{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-card label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
.login-card input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;outline:none;transition:border .2s;margin-bottom:16px}
.login-card input:focus{border-color:var(--primary)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:transform .1s,box-shadow .2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-light);box-shadow:0 4px 16px rgba(79,70,229,.35)}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
.btn-outline:hover{background:rgba(79,70,229,.06)}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;border-radius:8px}

/* ===== 主页面 ===== */
.main-page{display:flex;flex-direction:column;height:100%}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid var(--border);z-index:1000;flex-shrink:0}
.header h2{font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
.header-actions{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:none;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:background .15s}
.icon-btn:hover{background:var(--border)}

#map{flex:1;z-index:1}

/* ===== 底部面板 ===== */
.bottom-panel{background:#fff;border-top:1px solid var(--border);border-radius:20px 20px 0 0;margin-top:-16px;z-index:1000;max-height:55vh;display:flex;flex-direction:column;flex-shrink:0;box-shadow:0 -4px 20px rgba(0,0,0,.06)}
.panel-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 4px;flex-shrink:0}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-tab{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.panel-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.panel-content{overflow-y:auto;padding:12px 16px;flex:1;-webkit-overflow-scrolling:touch}

/* ===== 成员列表 ===== */
.member-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.member-item:last-child{border-bottom:none}
.avatar{width:40px;height:40px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0;position:relative}
.avatar .online-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;background:var(--success);border:2px solid #fff;border-radius:50%}
.member-info{margin-left:12px;flex:1;min-width:0}
.member-name{font-size:15px;font-weight:500}
.member-detail{font-size:12px;color:var(--text2);margin-top:2px}
.member-battery{display:flex;align-items:center;gap:3px;font-size:12px}
.battery-icon{display:inline-flex;align-items:center}

/* ===== 圈子列表 ===== */
.circle-item{display:flex;align-items:center;padding:12px;background:var(--bg);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.circle-item:hover{background:#EEF2FF}
.circle-item .circle-icon{width:44px;height:44px;border-radius:12px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.circle-item .circle-meta{margin-left:12px;flex:1}
.circle-item .circle-name{font-size:15px;font-weight:500}
.circle-item .circle-desc{font-size:12px;color:var(--text2);margin-top:2px}
.circle-item .invite-badge{font-size:11px;background:#EEF2FF;color:var(--primary);padding:3px 8px;border-radius:6px;font-weight:500}

/* ===== 模态框 ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;padding:20px 20px 32px;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.9,.3,1);overflow-y:auto}
.modal-overlay.active .modal{transform:translateY(0)}
.modal h3{font-size:18px;font-weight:600;margin-bottom:16px}
.modal-close{position:absolute;right:16px;top:16px;width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:18px}

/* ===== Toast ===== */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-100px);background:#1E293B;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:99999;transition:transform .3s cubic-bezier(.2,.9,.3,1);max-width:90%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== 围栏 ===== */
.fence-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.fence-item:last-child{border-bottom:none}
.fence-icon{width:36px;height:36px;border-radius:10px;background:#FEF3C7;color:var(--warning);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.fence-meta{margin-left:10px;flex:1}
.fence-name{font-size:14px;font-weight:500}
.fence-desc{font-size:12px;color:var(--text2)}

/* ===== 历史轨迹 ===== */
.history-controls{display:flex;gap:8px;margin-bottom:12px}
.history-controls .btn-sm{flex:1;text-align:center}
.trail-toggle{margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:13px}
.trail-toggle input{accent-color:var(--primary)}

/* ===== 空状态 ===== */
.empty-state{text-align:center;padding:32px 16px;color:var(--text2)}
.empty-state .icon{font-size:40px;margin-bottom:8px;opacity:.5}
.empty-state p{font-size:14px;margin-bottom:16px}

/* ===== 搜索位置弹窗 ===== */
.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:10px 14px 10px 36px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none}
.search-box input:focus{border-color:var(--primary)}
.search-box .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.4}
.search-results{max-height:200px;overflow-y:auto}
.search-result-item{padding:10px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px}
.search-result-item:hover{background:var(--bg)}
.search-result-item .sr-name{font-weight:500}
.search-result-item .sr-addr{color:var(--text2);font-size:12px}

/* ===== 响应式 ===== */
@media(min-width:768px){
  .modal{border-radius:20px;margin-bottom:10vh;max-width:440px}
}
</style>
</head>
<body>
<div id="app">
  <!-- 登录页 -->
  <div id="loginPage" class="login-page">
    <h1>FamilyMap</h1>
    <p>与家人朋友实时共享位置</p>
    <div class="login-card">
      <label>你的名字</label>
      <input type="text" id="nameInput" placeholder="输入你的名字" maxlength="12" autofocus>
      <button class="btn btn-primary" onclick="handleLogin()">开始使用</button>
    </div>
  </div>

  <!-- 主页面 -->
  <div id="mainPage" class="main-page" style="display:none">
    <div class="header">
      <h2 id="circleTitle">FamilyMap</h2>
      <div class="header-actions">
        <button class="icon-btn" onclick="locateMe()" title="定位自己">📍</button>
        <button class="icon-btn" onclick="showCircleModal()" title="圈子管理">⚙️</button>
      </div>
    </div>
    <div id="map"></div>
    <div class="bottom-panel">
      <div class="panel-handle"></div>
      <div class="panel-tabs">
        <div class="panel-tab active" data-tab="members" onclick="switchTab('members')">成员</div>
        <div class="panel-tab" data-tab="circles" onclick="switchTab('circles')">圈子</div>
        <div class="panel-tab" data-tab="fences" onclick="switchTab('fences')">围栏</div>
        <div class="panel-tab" data-tab="history" onclick="switchTab('history')">轨迹</div>
      </div>
      <div class="panel-content" id="panelContent">
        <!-- 动态内容 -->
      </div>
    </div>
  </div>
</div>

<!-- 圈子管理模态框 -->
<div class="modal-overlay" id="circleModal">
  <div class="modal">
    <h3>圈子管理</h3>
    <div style="margin-bottom:16px">
      <button class="btn btn-primary" onclick="showCreateCircle()" style="margin-bottom:8px">创建新圈子</button>
      <button class="btn btn-outline" onclick="showJoinCircle()">加入圈子</button>
    </div>
    <div id="circleModalContent"></div>
    <button class="btn btn-outline" onclick="closeCircleModal()" style="margin-top:12px">关闭</button>
  </div>
</div>

<!-- 创建围栏模态框 -->
<div class="modal-overlay" id="fenceModal">
  <div class="modal">
    <h3>添加围栏</h3>
    <label style="display:block;font-size:13px;color:var(--text2);margin-bottom:4px">围栏名称</label>
    <input type="text" id="fenceName" placeholder="如：家、学校、公司" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:12px;outline:none">
    <label style="display:block;font-size:13px;color:var(--text2);margin-bottom:4px">半径（米）</label>
    <input type="number" id="fenceRadius" value="200" min="50" max="5000" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:12px;outline:none">
    <div class="search-box" style="margin-bottom:12px">
      <span class="search-icon">🔍</span>
      <input type="text" id="fenceSearch" placeholder="搜索地点...">
      <div class="search-results" id="fenceSearchResults"></div>
    </div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:16px">或在地图上长按来选择位置</p>
    <button class="btn btn-primary" onclick="createFence()" style="margin-bottom:8px">确认添加</button>
    <button class="btn btn-outline" onclick="closeFenceModal()">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== 全局状态 ====================
let currentUser = null;
let currentCircle = null;
let socket = null;
let map = null;
let markers = {};
let fenceCircles = {};
let trailLines = {};
let watchId = null;
let myPosition = null;
let isSharingLocation = false;
let fencePinMode = false;

const API = '';
const STORAGE_KEY = 'familymap_user';

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    currentUser = JSON.parse(saved);
    enterMainPage();
  }
  // 回车登录
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
});

// ==================== 登录 ====================
async function handleLogin() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return showToast('请输入你的名字');
  
  try {
    const res = await fetch(API + '/api/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    const user = await res.json();
    currentUser = user;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
    enterMainPage();
  } catch (e) {
    showToast('连接失败，请检查服务是否启动');
  }
}

// ==================== 进入主页 ====================
function enterMainPage() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('mainPage').style.display = 'flex';
  initMap();
  initSocket();
  loadCircles();
}

// ==================== 地图 ====================
function initMap() {
  map = L.map('map', {
    zoomControl: false,
    attributionControl: false
  }).setView([39.9042, 116.4074], 13);

  L.control.zoom({ position: 'topright' }).addTo(map);

  // 使用高德瓦片（国内访问友好）
  L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
    subdomains: ['1','2','3','4'],
    maxZoom: 18
  }).addTo(map);

  // 地图长按添加围栏标记
  map.on('contextmenu', function(e) {
    if (fencePinMode) {
      document.getElementById('fenceName').focus();
      fencePinMode = false;
    }
  });

  // 尝试获取当前位置
  locateMe();
}

function locateMe() {
  if (!navigator.geolocation) {
    showToast('浏览器不支持定位');
    return;
  }
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude, longitude } = pos.coords;
    myPosition = { lat: latitude, lng: longitude };
    map.setView([latitude, longitude], 15);
    updateMyMarker(latitude, longitude);
  }, () => {
    showToast('无法获取位置，请检查浏览器权限');
  }, { enableHighAccuracy: true, timeout: 10000 });
}

function updateMyMarker(lat, lng) {
  if (markers['_me']) {
    markers['_me'].setLatLng([lat, lng]);
  } else {
    const icon = createPersonIcon(currentUser.avatar_color, currentUser.name, true);
    markers['_me'] = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(map);
    markers['_me'].bindPopup(`<b>${currentUser.name}</b>（我）`);
  }
}

function createPersonIcon(color, name, isMe) {
  const initial = name.charAt(0).toUpperCase();
  const border = isMe ? 'border:3px solid var(--primary);' : '';
  return L.divIcon({
    className: '',
    html: `<div style="position:relative">
      <div style="width:42px;height:42px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.25);${border}">${initial}</div>
      <div style="position:absolute;top:46px;left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(30,41,59,.85);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500">${name}</div>
    </div>`,
    iconSize: [42, 60],
    iconAnchor: [21, 42]
  });
}

// ==================== WebSocket ====================
function initSocket() {
  socket = io(API);
  socket.on('connect', () => {
    socket.emit('user:online', { userId: currentUser.id });
  });

  socket.on('member:location', (data) => {
    updateMemberMarker(data);
  });

  socket.on('member:online', (data) => {
    showToast('有人上线了');
    loadMembers();
  });

  socket.on('member:offline', (data) => {
    updateMemberOffline(data.userId);
  });

  socket.on('geofence:alert', (data) => {
    showToast(`${data.userName} ${data.action === 'entered' ? '进入' : '离开'}了 ${data.fenceName}`);
  });
}

// ==================== 位置共享 ====================
function startLocationSharing() {
  if (!navigator.geolocation) return;
  if (isSharingLocation) return;
  isSharingLocation = true;

  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      const { latitude, longitude, accuracy, speed } = pos.coords;
      myPosition = { lat: latitude, lng: longitude };
      updateMyMarker(latitude, longitude);

      // 获取电量信息（如果支持）
      let batteryLevel = null, isCharging = false;
      if (navigator.getBattery) {
        navigator.getBattery().then(b => {
          batteryLevel = Math.round(b.level * 100);
          isCharging = b.charging;
          emitLocation(latitude, longitude, accuracy, speed, batteryLevel, isCharging);
        });
      } else {
        emitLocation(latitude, longitude, accuracy, speed, null, false);
      }
    },
    () => {},
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
  showToast('位置共享已开启');
}

function emitLocation(lat, lng, accuracy, speed, battery, charging) {
  socket.emit('location:update', {
    userId: currentUser.id,
    latitude: lat,
    longitude: lng,
    accuracy,
    speed,
    batteryLevel: battery,
    isCharging: charging
  });
}

// ==================== 成员标记 ====================
function updateMemberMarker(data) {
  const userId = data.userId;
  if (userId === currentUser.id) return;

  // 查找成员信息
  const member = currentMembers?.find(m => m.id === userId);
  const name = member?.name || data.userName || '未知';
  const color = member?.avatar_color || '#64748B';

  if (markers[userId]) {
    markers[userId].setLatLng([data.latitude, data.longitude]);
  } else {
    const icon = createPersonIcon(color, name, false);
    markers[userId] = L.marker([data.latitude, data.longitude], { icon }).addTo(map);
  }

  // 弹窗信息
  const batteryHtml = data.batteryLevel != null
    ? `<div style="font-size:12px;color:#64748B">🔋 ${data.batteryLevel}%${data.isCharging ? ' ⚡' : ''}</div>` : '';
  const time = new Date(data.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  markers[userId].bindPopup(`<b>${name}</b><br>${batteryHtml}<div style="font-size:11px;color:#94A3B8">更新于 ${time}</div>`);
}

function updateMemberOffline(userId) {
  if (markers[userId]) {
    // 标记为灰色/半透明表示离线
  }
}

// ==================== 圈子管理 ====================
let myCircles = [];

async function loadCircles() {
  try {
    const res = await fetch(API + '/api/users/' + currentUser.id + '/circles');
    myCircles = await res.json();
    renderCircles();

    if (myCircles.length > 0 && !currentCircle) {
      selectCircle(myCircles[0]);
    }
  } catch (e) {}
}

async function selectCircle(circle) {
  currentCircle = circle;
  document.getElementById('circleTitle').textContent = circle.name;

  // 重新加入房间
  if (socket) {
    socket.emit('user:online', { userId: currentUser.id });
  }

  await loadMembers();
  await loadFences();
  startLocationSharing();
  renderCircles();
  switchTab('members');
}

async function loadMembers() {
  if (!currentCircle) return;
  try {
    const res = await fetch(API + '/api/circles/' + currentCircle.id + '/members');
    window.currentMembers = await res.json();
    renderMembers();
    // 在地图上显示成员
    window.currentMembers.forEach(m => {
      if (m.latitude && m.id !== currentUser.id) {
        const icon = createPersonIcon(m.avatar_color, m.name, false);
        if (markers[m.id]) {
          markers[m.id].setLatLng([m.latitude, m.longitude]);
        } else {
          markers[m.id] = L.marker([m.latitude, m.longitude], { icon }).addTo(map);
        }
        const time = m.recorded_at ? new Date(m.recorded_at).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '未知';
        const batteryHtml = m.battery_level != null
          ? `<div style="font-size:12px;color:#64748B">🔋 ${m.battery_level}%${m.is_charging ? ' ⚡' : ''}</div>` : '';
        markers[m.id].bindPopup(`<b>${m.name}</b><br>${batteryHtml}<div style="font-size:11px;color:#94A3B8">更新于 ${time}</div>`);
      }
    });
    // 调整地图视野
    fitMapToMembers();
  } catch (e) {}
}

function fitMapToMembers() {
  const points = [];
  if (myPosition) points.push([myPosition.lat, myPosition.lng]);
  Object.values(markers).forEach(m => {
    const ll = m.getLatLng();
    points.push([ll.lat, ll.lng]);
  });
  if (points.length > 1) {
    map.fitBounds(L.latLngBounds(points), { padding: [50, 50], maxZoom: 15 });
  }
}

// ==================== 渲染函数 ====================
function renderMembers() {
  const members = window.currentMembers || [];
  const isMe = m => m.id === currentUser.id;

  if (members.length === 0) {
    document.getElementById('panelContent').innerHTML = `
      <div class="empty-state">
        <div class="icon">👥</div>
        <p>还没有成员，邀请家人加入吧</p>
        <button class="btn btn-primary btn-sm" onclick="showCircleModal()">邀请加入</button>
      </div>`;
    return;
  }

  document.getElementById('panelContent').innerHTML = members.map(m => {
    const name = isMe(m) ? `${m.name}（我）` : m.name;
    const online = m.recorded_at && (Date.now() - new Date(m.recorded_at).getTime() < 600000);
    const time = m.recorded_at ? formatTime(m.recorded_at) : '未共享';
    const batteryHtml = m.battery_level != null
      ? `<span class="member-battery">${getBatteryIcon(m.battery_level, m.is_charging)} ${m.battery_level}%</span>` : '';

    return `<div class="member-item">
      <div class="avatar" style="background:${m.avatar_color}">${m.name.charAt(0)}${online ? '<div class="online-dot"></div>' : ''}</div>
      <div class="member-info">
        <div class="member-name">${name}</div>
        <div class="member-detail">${online ? '在线' : '离线'} · ${time} ${batteryHtml}</div>
      </div>
    </div>`;
  }).join('');
}

function renderCircles() {
  const html = myCircles.map(c => {
    const active = currentCircle && currentCircle.id === c.id;
    return `<div class="circle-item" style="${active ? 'background:#EEF2FF;' : ''}" onclick="selectCircle(myCircles.find(x=>x.id==='${c.id}'))">
      <div class="circle-icon">🏠</div>
      <div class="circle-meta">
        <div class="circle-name">${c.name}</div>
        <div class="circle-desc">${c.member_count || 1} 位成员</div>
      </div>
      <span class="invite-badge">${c.invite_code}</span>
    </div>`;
  }).join('');

  document.getElementById('panelContent').innerHTML = html || `
    <div class="empty-state">
      <div class="icon">🏠</div>
      <p>你还没有圈子，创建一个吧</p>
      <button class="btn btn-primary btn-sm" onclick="showCircleModal()">创建圈子</button>
    </div>`;
}

async function renderFences() {
  if (!currentCircle) return;
  try {
    const res = await fetch(API + '/api/circles/' + currentCircle.id + '/geofences');
    const fences = await res.json();

    // 显示围栏圆圈
    Object.values(fenceCircles).forEach(c => map.removeLayer(c));
    fenceCircles = {};
    fences.forEach(f => {
      fenceCircles[f.id] = L.circle([f.latitude, f.longitude], {
        radius: f.radius,
        color: '#F59E0B',
        fillColor: '#FEF3C7',
        fillOpacity: 0.3,
        weight: 2
      }).addTo(map);
    });

    if (fences.length === 0) {
      document.getElementById('panelContent').innerHTML = `
        <div class="empty-state">
          <div class="icon">📍</div>
          <p>添加围栏，成员进出时自动提醒</p>
          <button class="btn btn-primary btn-sm" onclick="showFenceModal()">添加围栏</button>
        </div>`;
      return;
    }

    document.getElementById('panelContent').innerHTML = fences.map(f => `
      <div class="fence-item">
        <div class="fence-icon">📍</div>
        <div class="fence-meta">
          <div class="fence-name">${f.name}</div>
          <div class="fence-desc">半径 ${f.radius}米</div>
        </div>
      </div>`).join('') + `<button class="btn btn-outline btn-sm" onclick="showFenceModal()" style="margin-top:8px">添加新围栏</button>`;
  } catch(e) {}
}

async function loadFences() {
  await renderFences();
}

// ==================== Tab切换 ====================
function switchTab(tab) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  
  if (tab === 'members') renderMembers();
  else if (tab === 'circles') renderCircles();
  else if (tab === 'fences') renderFences();
  else if (tab === 'history') showHistory();
}

// ==================== 圈子模态框 ====================
function showCircleModal() {
  document.getElementById('circleModal').classList.add('active');
  renderCircleModalContent();
}
function closeCircleModal() {
  document.getElementById('circleModal').classList.remove('active');
}
function renderCircleModalContent() {
  const html = myCircles.map(c => `
    <div class="circle-item" onclick="selectCircle(myCircles.find(x=>x.id==='${c.id}'))">
      <div class="circle-icon">🏠</div>
      <div class="circle-meta">
        <div class="circle-name">${c.name}</div>
        <div class="circle-desc">邀请码: ${c.invite_code}</div>
      </div>
      <span class="invite-badge" onclick="event.stopPropagation();copyInvite('${c.invite_code}')">复制邀请码</span>
    </div>`).join('');
  document.getElementById('circleModalContent').innerHTML = html || '<p style="color:var(--text2);font-size:14px">你还没有圈子</p>';
}

function showCreateCircle() {
  const name = prompt('圈子名称：', '我的家人');
  if (!name) return;
  fetch(API + '/api/circles', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, userId: currentUser.id })
  }).then(r => r.json()).then(circle => {
    showToast(`圈子已创建！邀请码: ${circle.invite_code}`);
    loadCircles();
    selectCircle(circle);
    renderCircleModalContent();
  });
}

function showJoinCircle() {
  const code = prompt('输入邀请码：');
  if (!code) return;
  fetch(API + '/api/circles/join', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ inviteCode: code.trim(), userId: currentUser.id })
  }).then(r => r.json()).then(data => {
    if (data.error) return showToast(data.error);
    showToast(data.alreadyMember ? '你已经在圈子里了' : '加入成功！');
    loadCircles();
    selectCircle(data.circle);
    renderCircleModalContent();
  });
}

function copyInvite(code) {
  navigator.clipboard?.writeText(code).then(() => showToast('邀请码已复制：' + code));
}

// ==================== 围栏模态框 ====================
let fenceLatLng = null;

function showFenceModal() {
  fenceLatLng = null;
  document.getElementById('fenceName').value = '';
  document.getElementById('fenceRadius').value = 200;
  document.getElementById('fenceModal').classList.add('active');

  // 点击地图选点
  map.once('click', (e) => {
    fenceLatLng = e.latlng;
    showToast(`已选位置: ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`);
  });
}
function closeFenceModal() {
  document.getElementById('fenceModal').classList.remove('active');
}

// 围栏地点搜索
document.getElementById('fenceSearch').addEventListener('input', debounce(async function() {
  const q = this.value.trim();
  if (q.length < 2) { document.getElementById('fenceSearchResults').innerHTML = ''; return; }
  try {
    const res = await fetch(`https://restapi.amap.com/v3/assistant/inputtips?key=YOUR_KEY&s=r&keywords=${encodeURIComponent(q)}`);
    // 简单处理，实际需要高德API Key
    document.getElementById('fenceSearchResults').innerHTML = '<div class="search-result-item" style="opacity:.5">需要配置高德API Key后启用搜索</div>';
  } catch(e) {}
}, 300));

function createFence() {
  if (!currentCircle) return showToast('请先选择圈子');
  const name = document.getElementById('fenceName').value.trim();
  const radius = parseInt(document.getElementById('fenceRadius').value) || 200;
  if (!name) return showToast('请输入围栏名称');
  
  const lat = fenceLatLng ? fenceLatLng.lat : (myPosition?.lat || 39.9042);
  const lng = fenceLatLng ? fenceLatLng.lng : (myPosition?.lng || 116.4074);

  fetch(API + '/api/circles/' + currentCircle.id + '/geofences', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, latitude: lat, longitude: lng, radius, createdBy: currentUser.id })
  }).then(r => r.json()).then(() => {
    showToast('围栏已添加');
    closeFenceModal();
    renderFences();
  });
}

// ==================== 历史轨迹 ====================
async function showHistory() {
  if (!currentCircle || !window.currentMembers) {
    document.getElementById('panelContent').innerHTML = '<div class="empty-state"><div class="icon">🗺️</div><p>暂无轨迹数据</p></div>';
    return;
  }

  const members = window.currentMembers || [];
  document.getElementById('panelContent').innerHTML = `
    <div class="history-controls">
      <button class="btn btn-sm btn-outline" onclick="loadTrail(6)">6小时</button>
      <button class="btn btn-sm btn-outline" onclick="loadTrail(24)">24小时</button>
      <button class="btn btn-sm btn-outline" onclick="loadTrail(72)">3天</button>
    </div>
    <div class="trail-toggle">
      <input type="checkbox" id="showTrails" onchange="toggleTrails(this.checked)">
      <label for="showTrails">显示所有成员轨迹</label>
    </div>
    <div id="trailList">${members.map(m => `
      <div class="member-item" style="cursor:pointer" onclick="loadMemberTrail('${m.id}','${m.name}')">
        <div class="avatar" style="background:${m.avatar_color};width:32px;height:32px;font-size:13px">${m.name.charAt(0)}</div>
        <div class="member-info" style="margin-left:8px">
          <div class="member-name" style="font-size:14px">${m.name}</div>
        </div>
      </div>`).join('')}</div>`;

  // 清除旧轨迹
  Object.values(trailLines).forEach(l => map.removeLayer(l));
  trailLines = {};
}

async function loadTrail(hours) {
  const members = window.currentMembers || [];
  for (const m of members) {
    await loadMemberTrail(m.id, m.name, hours);
  }
}

async function loadMemberTrail(userId, name, hours = 24) {
  try {
    const res = await fetch(API + '/api/users/' + userId + '/locations?hours=' + hours);
    const locs = await res.json();
    if (locs.length < 2) return;

    // 清除旧线
    if (trailLines[userId]) map.removeLayer(trailLines[userId]);

    const member = (window.currentMembers || []).find(m => m.id === userId);
    const color = member?.avatar_color || '#4F46E5';
    const points = locs.map(l => [l.latitude, l.longitude]);
    trailLines[userId] = L.polyline(points, { color, weight: 3, opacity: 0.6, dashArray: '6,4' }).addTo(map);

    if (points.length > 0) {
      map.fitBounds(trailLines[userId].getBounds(), { padding: [50, 50] });
    }
  } catch(e) {}
}

function toggleTrails(show) {
  Object.values(trailLines).forEach(l => {
    if (show) l.addTo(map); else map.removeLayer(l);
  });
}

// ==================== 工具函数 ====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function formatTime(iso) {
  const d = new Date(iso);
  const now = Date.now();
  const diff = now - d.getTime();
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
  return d.toLocaleDateString('zh-CN');
}

function getBatteryIcon(level, charging) {
  let icon = '🔋';
  if (charging) icon = '⚡';
  else if (level > 75) icon = '🔋';
  else if (level > 50) icon = '🔋';
  else if (level > 25) icon = '🪫';
  else icon = '🪫';
  return icon;
}

function debounce(fn, ms) {
  let t;
  return function(...args) {
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

// 点击模态框外关闭
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('active');
  });
});
</script>
